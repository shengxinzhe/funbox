<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Your Life in Weeks - FunBox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--text:#e8e8f0;--text2:#8888a0;--accent:#6c63ff;--lived:#6c63ff;--future:rgba(255,255,255,.06);--milestone:#ff6584}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 32px}
.logo{font-size:20px;font-weight:800}.logo span{color:var(--accent)}
.back{color:var(--text2);font-size:14px}.back:hover{color:var(--text)}
.lang-sw{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text2);padding:5px 12px;border-radius:16px;cursor:pointer;font-size:12px}

.setup{max-width:480px;margin:40px auto;padding:0 20px;text-align:center}
.setup h1{font-size:32px;font-weight:800;margin-bottom:8px}
.setup p{color:var(--text2);margin-bottom:28px;line-height:1.6}
.form-row{display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.form-row label{color:var(--text2);font-size:14px;min-width:80px;text-align:right}
.form-row input,.form-row select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:10px 16px;border-radius:10px;font-size:15px;width:160px;outline:none}
.form-row input:focus{border-color:var(--accent)}
.go-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px 40px;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px;transition:.2s}
.go-btn:hover{background:#5b54e6;transform:scale(1.03)}

.viz{display:none;padding:20px;max-width:1100px;margin:0 auto}
.viz-header{text-align:center;margin-bottom:24px}
.viz-header h2{font-size:24px;font-weight:700;margin-bottom:8px}
.viz-stat{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.stat-box{background:rgba(255,255,255,.04);padding:12px 24px;border-radius:12px;text-align:center}
.stat-num{font-size:28px;font-weight:800;color:var(--accent)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

.grid-container{overflow-x:auto;padding:10px 0}
.year-label{font-size:10px;color:var(--text2);width:36px;text-align:right;flex-shrink:0;padding-right:4px}
.grid-row{display:flex;align-items:center;gap:0;height:8px;margin-bottom:1px}
.week{width:7px;height:7px;border-radius:1.5px;background:var(--future);flex-shrink:0;margin:0 .5px;transition:background .1s}
.week.lived{background:var(--lived)}
.week.current{background:#fff;box-shadow:0 0 6px #fff}
.week.milestone{background:var(--milestone)}
.week:hover{transform:scale(2);z-index:2;position:relative}

.legend{display:flex;gap:20px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px}

.tooltip{position:fixed;background:#1a1a2e;border:1px solid rgba(255,255,255,.15);color:var(--text);padding:8px 12px;border-radius:8px;font-size:12px;pointer-events:none;z-index:100;display:none;white-space:nowrap}

.reset-btn{display:block;margin:24px auto 40px;background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--text2);padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px}
.reset-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<header class="header">
  <a href="../index.html" class="logo">Fun<span>Box</span></a>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="lang-sw" onclick="cycleLang()" id="langBtn">中文</button>
    <a href="../index.html" class="back" data-i18n="back">&larr; 返回</a>
  </div>
</header>

<div class="setup" id="setup">
  <h1 data-i18n="title">你的一生（周）</h1>
  <p data-i18n="intro">人的一生大约 4000 周。输入你的生日，看看你已经度过了多少。</p>
  <div class="form-row">
    <label data-i18n="birthday">生日</label>
    <input type="date" id="birthDate" value="1997-01-01">
  </div>
  <div class="form-row">
    <label data-i18n="lifespan">预期寿命</label>
    <select id="lifeExpect">
      <option value="70">70</option>
      <option value="75">75</option>
      <option value="80" selected>80</option>
      <option value="85">85</option>
      <option value="90">90</option>
    </select>
  </div>
  <button class="go-btn" onclick="generate()" data-i18n="generate">生成我的一生</button>
</div>

<div class="viz" id="viz">
  <div class="viz-header">
    <h2 data-i18n="your_life">你的一生</h2>
    <div class="viz-stat">
      <div class="stat-box"><div class="stat-num" id="livedWeeks">0</div><div class="stat-label" data-i18n="weeks_lived">已度过的周</div></div>
      <div class="stat-box"><div class="stat-num" id="leftWeeks">0</div><div class="stat-label" data-i18n="weeks_left">剩余的周</div></div>
      <div class="stat-box"><div class="stat-num" id="pctUsed">0%</div><div class="stat-label" data-i18n="pct_used">已使用</div></div>
    </div>
  </div>
  <div class="grid-container" id="gridContainer"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--lived)"></div><span data-i18n="leg_lived">已度过</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff"></div><span data-i18n="leg_now">当前周</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--future)"></div><span data-i18n="leg_future">未来</span></div>
  </div>
  <button class="reset-btn" onclick="reset()" data-i18n="reset">重新设置</button>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
var I18N={
  zh:{title:'你的一生（周）',intro:'人的一生大约 4000 周。输入你的生日，看看你已经度过了多少。',birthday:'生日',lifespan:'预期寿命',generate:'生成我的一生',your_life:'你的一生',weeks_lived:'已度过的周',weeks_left:'剩余的周',pct_used:'已使用',leg_lived:'已度过',leg_now:'当前周',leg_future:'未来',reset:'重新设置',back:'← 返回',year_label:'岁',week_label:'第 {w} 周',age_label:'{a} 岁',lang:'中文'},
  en:{title:'Your Life in Weeks',intro:'A human life is about 4,000 weeks. Enter your birthday to see how many you have used.',birthday:'Birthday',lifespan:'Life expectancy',generate:'Generate My Life',your_life:'Your Life',weeks_lived:'Weeks Lived',weeks_left:'Weeks Left',pct_used:'Used',leg_lived:'Lived',leg_now:'Current',leg_future:'Future',reset:'Reset',back:'← Back',year_label:'yrs',week_label:'Week {w}',age_label:'Age {a}',lang:'English'},
  ja:{title:'人生を週で見る',intro:'人の一生は約4000週間。誕生日を入力して、どれだけ過ごしたか見てみよう。',birthday:'誕生日',lifespan:'予想寿命',generate:'生成する',your_life:'あなたの人生',weeks_lived:'過ごした週',weeks_left:'残りの週',pct_used:'使用済み',leg_lived:'過ごした',leg_now:'今週',leg_future:'未来',reset:'リセット',back:'← 戻る',year_label:'歳',week_label:'第{w}週',age_label:'{a}歳',lang:'日本語'},
  ko:{title:'당신의 인생 (주 단위)',intro:'인생은 약 4000주입니다. 생일을 입력하고 얼마나 보냈는지 확인하세요.',birthday:'생일',lifespan:'기대 수명',generate:'내 인생 생성',your_life:'당신의 인생',weeks_lived:'보낸 주',weeks_left:'남은 주',pct_used:'사용',leg_lived:'보낸',leg_now:'이번 주',leg_future:'미래',reset:'초기화',back:'← 돌아가기',year_label:'세',week_label:'{w}주차',age_label:'{a}세',lang:'한국어'},
  es:{title:'Tu Vida en Semanas',intro:'Una vida humana son unas 4000 semanas. Ingresa tu fecha de nacimiento.',birthday:'Nacimiento',lifespan:'Esperanza de vida',generate:'Generar Mi Vida',your_life:'Tu Vida',weeks_lived:'Semanas Vividas',weeks_left:'Semanas Restantes',pct_used:'Usado',leg_lived:'Vivido',leg_now:'Actual',leg_future:'Futuro',reset:'Reiniciar',back:'← Volver',year_label:'anos',week_label:'Semana {w}',age_label:'{a} anos',lang:'Espanol'},
  fr:{title:'Votre Vie en Semaines',intro:'Une vie humaine represente environ 4000 semaines. Entrez votre date de naissance.',birthday:'Naissance',lifespan:'Esperance de vie',generate:'Generer Ma Vie',your_life:'Votre Vie',weeks_lived:'Semaines Vecues',weeks_left:'Semaines Restantes',pct_used:'Utilise',leg_lived:'Vecu',leg_now:'Actuel',leg_future:'Futur',reset:'Reinitialiser',back:'← Retour',year_label:'ans',week_label:'Semaine {w}',age_label:'{a} ans',lang:'Francais'}
};
var langs=['zh','en','ja','ko','es','fr'];
var lang=localStorage.getItem('funbox_lang')||'zh';
var t=function(){return I18N[lang]||I18N.zh};
function cycleLang(){var i=(langs.indexOf(lang)+1)%langs.length;lang=langs[i];localStorage.setItem('funbox_lang',lang);applyI18n();}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(t()[k])el.textContent=t()[k];});document.getElementById('langBtn').textContent=t().lang;}

var tooltip=document.getElementById('tooltip');

function generate(){
  var bd=new Date(document.getElementById('birthDate').value);
  var le=parseInt(document.getElementById('lifeExpect').value);
  if(isNaN(bd.getTime()))return;
  var now=new Date();
  var totalWeeks=le*52;
  var diffMs=now-bd;
  var livedW=Math.floor(diffMs/(7*24*60*60*1000));
  if(livedW<0)livedW=0;
  var leftW=Math.max(0,totalWeeks-livedW);
  var pct=Math.min(100,(livedW/totalWeeks*100)).toFixed(1);

  document.getElementById('livedWeeks').textContent=livedW.toLocaleString();
  document.getElementById('leftWeeks').textContent=leftW.toLocaleString();
  document.getElementById('pctUsed').textContent=pct+'%';

  var container=document.getElementById('gridContainer');
  container.innerHTML='';
  for(var y=0;y<le;y++){
    var row=document.createElement('div');
    row.className='grid-row';
    if(y%5===0){
      var lbl=document.createElement('div');
      lbl.className='year-label';
      lbl.textContent=y;
      row.appendChild(lbl);
    }else{
      var sp=document.createElement('div');
      sp.className='year-label';
      row.appendChild(sp);
    }
    for(var w=0;w<52;w++){
      var weekNum=y*52+w;
      var cell=document.createElement('div');
      cell.className='week';
      if(weekNum<livedW)cell.classList.add('lived');
      else if(weekNum===livedW)cell.classList.add('current');
      cell.setAttribute('data-year',y);
      cell.setAttribute('data-week',w);
      cell.addEventListener('mouseenter',showTip);
      cell.addEventListener('mouseleave',hideTip);
      row.appendChild(cell);
    }
    container.appendChild(row);
  }

  document.getElementById('setup').style.display='none';
  document.getElementById('viz').style.display='block';
}

function showTip(e){
  var y=parseInt(e.target.getAttribute('data-year'));
  var w=parseInt(e.target.getAttribute('data-week'));
  tooltip.textContent=t().age_label.replace('{a}',y)+' - '+t().week_label.replace('{w}',w+1);
  tooltip.style.display='block';
  tooltip.style.left=(e.clientX+12)+'px';
  tooltip.style.top=(e.clientY-30)+'px';
}
function hideTip(){tooltip.style.display='none';}
function reset(){
  document.getElementById('setup').style.display='block';
  document.getElementById('viz').style.display='none';
}
applyI18n();
</script>
</body>
</html>
