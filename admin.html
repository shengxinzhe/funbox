<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FunBox Admin - Newsletter</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:40px 20px}
.wrap{max-width:700px;margin:0 auto}
h1{font-size:24px;margin-bottom:8px}
.sub{color:#8888a0;margin-bottom:32px}
label{display:block;font-size:14px;color:#8888a0;margin-bottom:6px;margin-top:20px}
input,textarea,select{width:100%;padding:12px 16px;background:#14141f;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8f0;font-size:15px;font-family:inherit;outline:none;transition:.2s}
input:focus,textarea:focus{border-color:#6c63ff}
textarea{min-height:200px;resize:vertical}
.btn{display:inline-block;margin-top:24px;padding:14px 32px;background:linear-gradient(135deg,#6c63ff,#5a52d5);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(108,99,255,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result{margin-top:20px;padding:16px;border-radius:10px;display:none}
.result.ok{display:block;background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:#81c784}
.result.err{display:block;background:rgba(244,67,54,.15);border:1px solid rgba(244,67,54,.3);color:#e57373}
.preview{margin-top:20px;padding:20px;background:#fff;color:#333;border-radius:10px;display:none}
.preview h3{margin-bottom:10px;color:#333}
.tabs{display:flex;gap:8px;margin-top:20px}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#8888a0;transition:.2s}
.tab.active{background:#6c63ff;color:#fff;border-color:#6c63ff}
.template-hint{font-size:12px;color:#8888a0;margin-top:8px}
.auth-wall{text-align:center;padding:80px 20px}
.auth-wall input{max-width:300px;margin:0 auto;text-align:center}
</style>
</head>
<body>

<div class="wrap" id="authWall">
  <div class="auth-wall">
    <h1>FunBox Admin</h1>
    <p class="sub">Enter admin key to continue</p>
    <input type="password" id="keyInput" placeholder="Admin Key" onkeydown="if(event.key==='Enter')auth()">
    <br>
    <button class="btn" style="margin-top:16px" onclick="auth()">Enter</button>
  </div>
</div>

<div class="wrap" id="main" style="display:none">
  <h1>Newsletter Sender</h1>
  <p class="sub">Send an email to all FunBox subscribers</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('compose')">Compose</div>
    <div class="tab" onclick="switchTab('template')">New Game Template</div>
  </div>

  <label for="subject">Subject</label>
  <input type="text" id="subject" placeholder="FunBox New Game: ...">

  <label for="body">Email HTML Body</label>
  <textarea id="body" placeholder="Write your email content here..."></textarea>
  <p class="template-hint">Supports HTML. The unsubscribe link is appended automatically.</p>

  <button class="btn" onclick="preview()">Preview</button>
  <button class="btn" onclick="send()" id="sendBtn" style="margin-left:8px;background:linear-gradient(135deg,#ff6584,#d5527a)">Send to All</button>

  <div class="preview" id="previewBox"></div>
  <div class="result" id="result"></div>
</div>

<script>
var adminKey='';

function auth(){
  adminKey=document.getElementById('keyInput').value.trim();
  if(!adminKey){alert('Please enter admin key');return}
  document.getElementById('authWall').style.display='none';
  document.getElementById('main').style.display='block';
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active',i===(tab==='compose'?0:1));
  });
  if(tab==='template'){
    document.getElementById('subject').value='FunBox New Game Available!';
    document.getElementById('body').value=newGameTemplate();
  }
}

function newGameTemplate(){
  return '<div style="max-width:600px;margin:0 auto;font-family:-apple-system,sans-serif;background:#0a0a0f;color:#e8e8f0;padding:40px 30px;border-radius:16px">\n'+
    '  <h1 style="font-size:28px;text-align:center;margin-bottom:8px">FunBox</h1>\n'+
    '  <p style="text-align:center;color:#8888a0;margin-bottom:32px">New game just dropped!</p>\n'+
    '  \n'+
    '  <div style="background:#14141f;border-radius:12px;padding:24px;text-align:center;margin-bottom:24px">\n'+
    '    <div style="font-size:48px;margin-bottom:12px">GAME_ICON</div>\n'+
    '    <h2 style="font-size:22px;margin-bottom:8px">GAME_NAME</h2>\n'+
    '    <p style="color:#8888a0;font-size:15px;margin-bottom:20px">GAME_DESCRIPTION</p>\n'+
    '    <a href="GAME_URL" style="display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#6c63ff,#5a52d5);color:#fff;border-radius:10px;text-decoration:none;font-weight:600">Play Now</a>\n'+
    '  </div>\n'+
    '  \n'+
    '  <p style="text-align:center;color:#8888a0;font-size:13px">Have fun!</p>\n'+
    '</div>';
}

function preview(){
  var box=document.getElementById('previewBox');
  box.innerHTML=document.getElementById('body').value;
  box.style.display='block';
}

function send(){
  var subject=document.getElementById('subject').value.trim();
  var html=document.getElementById('body').value.trim();
  if(!subject||!html){alert('Fill in subject and body');return}
  if(!confirm('Send this email to ALL subscribers?'))return;

  var btn=document.getElementById('sendBtn');
  btn.disabled=true;
  btn.textContent='Sending...';
  var res=document.getElementById('result');
  res.className='result';res.style.display='none';

  fetch('/api/newsletter',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminKey},
    body:JSON.stringify({subject:subject,html:html})
  })
  .then(function(r){return r.json()})
  .then(function(data){
    btn.disabled=false;btn.textContent='Send to All';
    if(data.ok){
      res.className='result ok';
      res.textContent='Sent successfully to '+data.sent+'/'+data.total+' subscribers.';
      res.style.display='block';
    } else {
      res.className='result err';
      res.textContent='Error: '+(data.error||'unknown');
      res.style.display='block';
    }
  })
  .catch(function(e){
    btn.disabled=false;btn.textContent='Send to All';
    res.className='result err';
    res.textContent='Network error: '+e.message;
    res.style.display='block';
  });
}
</script>
</body>
</html>
