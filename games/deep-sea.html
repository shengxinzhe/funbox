<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Deep Sea - FunBox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--text:#e8e8f0;--text2:#8888a0;--accent:#6c63ff}
body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
a{color:inherit;text-decoration:none}

.header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px)}
.logo{font-size:18px;font-weight:800}.logo span{color:var(--accent)}
.nav-r{display:flex;align-items:center;gap:12px}
.lang-sw{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:var(--text2);padding:4px 10px;border-radius:12px;cursor:pointer;font-size:11px}
.back{color:var(--text2);font-size:13px}.back:hover{color:var(--text)}

.depth-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:90;text-align:right}
.depth-num{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.depth-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}

.ocean{width:100%;position:relative}
.zone{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:60px 20px;transition:background .3s}

.zone-title{font-size:clamp(24px,4vw,40px);font-weight:800;opacity:.15;text-transform:uppercase;letter-spacing:4px;margin-bottom:40px;text-align:center}

.creature{display:flex;align-items:center;gap:20px;max-width:560px;width:100%;padding:20px;margin:12px 0;background:rgba(255,255,255,.04);border-radius:16px;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(4px);opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s}
.creature.visible{opacity:1;transform:translateY(0)}
.creature-icon{font-size:48px;flex-shrink:0;width:64px;text-align:center}
.creature-info h3{font-size:16px;font-weight:700;margin-bottom:4px}
.creature-info p{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5}
.creature-depth{font-size:11px;color:var(--accent);font-weight:600;margin-top:6px}

.landmark{text-align:center;padding:30px 20px;margin:20px 0;opacity:0;transform:scale(.9);transition:opacity .6s,transform .6s}
.landmark.visible{opacity:1;transform:scale(1)}
.landmark-line{width:1px;height:40px;background:rgba(255,255,255,.15);margin:0 auto 12px}
.landmark-text{font-size:13px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:1px}
.landmark-depth{font-size:18px;font-weight:800;margin-top:4px}

.bottom{text-align:center;padding:80px 20px 120px;max-width:500px;margin:0 auto}
.bottom h2{font-size:28px;font-weight:800;margin-bottom:12px}
.bottom p{color:rgba(255,255,255,.4);font-size:15px;line-height:1.6}

.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}
.bubble{position:absolute;bottom:-20px;background:rgba(255,255,255,.04);border-radius:50%;animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-110vh) scale(.5);opacity:0}}
</style>
</head>
<body>

<header class="header">
  <a href="../index.html" class="logo">Fun<span>Box</span></a>
  <div class="nav-r">
    <button class="lang-sw" onclick="cycleLang()" id="langBtn">中文</button>
    <a href="../index.html" class="back" data-i18n="back">&larr; 返回</a>
  </div>
</header>

<div class="depth-indicator">
  <div class="depth-num" id="depthNum">0m</div>
  <div class="depth-label" data-i18n="depth">深度</div>
</div>

<div class="bubbles" id="bubbles"></div>

<div class="ocean" id="ocean"></div>

     {depth:500,zh:'帝国大厦的高度',en:'Height of Empire State Building',ja:'エンパイアステートビルの高さ',ko:'엠파이어 스테이트 빌딩 높이',es:'Altura Empire State',fr:'Hauteur Empire State Building'}
   ]},
  {name:{zh:'深海带',en:'Midnight Zone',ja:'漸深層',ko:'심해대',es:'Zona abisal',fr:'Zone abyssale'},

   creatures:[

     {icon:'🪱',depth:2500,zh:['管虫','不需要阳光，靠化学能生存'],en:['Tube Worm','Lives on chemical energy, no sunlight needed'],ja:['チューブワーム','光不要、化学エネルギーで生存'],ko:['관벌레','햇빛 없이 화학 에너지로 생존'],es:['Gusano tubicola','Vive de energia quimica'],fr:['Ver tubicole','Vit d energie chimique']},

   ]},

     {depth:8848,zh:'如果把珠穆朗玛峰倒过来放，峰顶在这里',en:'Mt. Everest would fit upside down here',ja:'エベレストを逆さにしてもここに収まる',ko:'에베레스트를 거꾸로 넣어도 여기 들어감',es:'El Everest invertido cabria aqui',fr:'L Everest renverse tiendrait ici'},

var MAX_DEPTH=11000;
var PX_PER_METER=6;

function buildOcean(){
  var ocean=document.getElementById('ocean');
  ocean.innerHTML='';

  // Start zone
  var startDiv=document.createElement('div');
  startDiv.className='zone';
  startDiv.style.minHeight='100vh';
  startDiv.style.background='linear-gradient(180deg,#0099cc,#0077be)';
  startDiv.innerHTML='<div class="zone-title" style="opacity:.6;font-size:clamp(20px,4vw,36px);letter-spacing:2px">'+t().scroll_hint+'</div>';
  ocean.appendChild(startDiv);

  ZONES.forEach(function(zone){
    var div=document.createElement('div');
    div.className='zone';
    var h=(zone.to-zone.from)*PX_PER_METER;
    div.style.minHeight=h+'px';
    div.style.background='linear-gradient(180deg,'+zone.color1+','+zone.color2+')';
    div.setAttribute('data-from',zone.from);
    div.setAttribute('data-to',zone.to);

    div.innerHTML='<div class="zone-title">'+(zone.name[lang]||zone.name.en)+'</div>';

    // Merge creatures and landmarks, sort by depth
    var items=[];
    zone.creatures.forEach(function(c){items.push({type:'creature',data:c,depth:c.depth});});
    zone.landmarks.forEach(function(l){items.push({type:'landmark',data:l,depth:l.depth});});
    items.sort(function(a,b){return a.depth-b.depth;});

    items.forEach(function(item){
      if(item.type==='creature'){
        var c=item.data;
        var info=c[lang]||c.en;
        var el=document.createElement('div');
        el.className='creature';
        el.innerHTML='<div class="creature-icon">'+c.icon+'</div><div class="creature-info"><h3>'+info[0]+'</h3><p>'+info[1]+'</p><div class="creature-depth">'+c.depth+'m</div></div>';
        div.appendChild(el);
      }else{
        var l=item.data;
        var el=document.createElement('div');
        el.className='landmark';
        el.innerHTML='<div class="landmark-line"></div><div class="landmark-text">'+(l[lang]||l.en)+'</div><div class="landmark-depth">'+l.depth+'m</div>';
        div.appendChild(el);
      }
    });

    ocean.appendChild(div);
  });

  // Bottom
  var bottom=document.createElement('div');
  bottom.className='zone';
  bottom.style.minHeight='60vh';
  bottom.style.background='#020204';
  bottom.innerHTML='<div class="bottom"><h2>'+t().bottom_title+'</h2><p>'+t().bottom_desc+'</p><div style="margin-top:24px;font-size:64px">🏴</div></div>';
  ocean.appendChild(bottom);
}

// Depth tracking
function updateDepth(){
  var scrollY=window.scrollY;
  var totalH=document.getElementById('ocean').scrollHeight-window.innerHeight;
  var pct=Math.min(1,scrollY/totalH);
  var depth=Math.round(pct*MAX_DEPTH);
  document.getElementById('depthNum').textContent=depth+'m';
}

// Scroll reveal
function revealOnScroll(){
  var els=document.querySelectorAll('.creature:not(.visible),.landmark:not(.visible)');
  var wh=window.innerHeight;
  els.forEach(function(el){
    var r=el.getBoundingClientRect();
    if(r.top<wh*0.85){el.classList.add('visible');}
  });
}

window.addEventListener('scroll',function(){updateDepth();revealOnScroll();},{passive:true});

// Bubbles
function createBubbles(){
  var container=document.getElementById('bubbles');
  for(var i=0;i<15;i++){
    var b=document.createElement('div');
    b.className='bubble';
    var size=Math.random()*8+4;
    b.style.width=size+'px';
    b.style.height=size+'px';
    b.style.left=Math.random()*100+'%';
    b.style.animationDuration=(Math.random()*8+6)+'s';
    b.style.animationDelay=Math.random()*10+'s';
    container.appendChild(b);
  }
}

buildOcean();
createBubbles();
updateDepth();
</script>
</body>
</html>
